<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quiz Report</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <style>
        body {
            background: linear-gradient(to right, #eef2f3, #dfe9f3);
            font-family: 'Segoe UI', sans-serif;
        }

        .card {
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .title {
            font-weight: 600;
            color: #333;
        }

        .btn-custom {
            background-color: #007bff;
            color: white;
            border-radius: 8px;
        }

        .btn-custom:hover {
            background-color: #0056b3;
        }

        select {
            border-radius: 8px !important;
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 w-50">

        <h3 class="text-center mb-4 title">📊 Quiz Report Filter</h3>

        <form method="POST" action="/Result" id="filterForm">

            <div class="mb-3">
                <label class="form-label">Select Department</label>
                <select class="form-select" name="ResType" id="ResType" required>
                    <option value="">-- Choose Option --</option>
                    <option value="All">All</option>
                    <option value="OPSTEST">Ops & Cs</option>
                    <option value="ITTEST">IT</option>
                </select>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-custom">Generate Report</button>
            </div>

        </form>

    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS -->
<script>
    document.getElementById("filterForm").addEventListener("submit", function(e) {
        let value = document.getElementById("ResType").value;

        if (value === "") {
            e.preventDefault();
            alert("Please select a category before submitting!");
        }
    });
</script>

</body>
</html>
