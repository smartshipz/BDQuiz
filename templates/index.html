<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quiz App</title>
<link href="https://fonts.googleapis.com" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
   :root{--primary:#003366;--accent:#ffcc00;--text-main:#1e293b;--text-muted:#64748b;--border:#e2e8f0;--bg:#f8fafc}body{font-family:Inter,sans-serif;background-color:var(--bg);color:var(--text-main);margin:0;display:flex;justify-content:center;padding:40px 20px}.quiz-container{width:100%;background:#fff;padding:40px;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,.08);border-top:6px solid var(--primary)}h2,h3{margin:0;font-size:1.5rem;color:var(--primary);font-weight:700}header{margin-bottom:32px}.subtitle{font-size:.9rem;color:var(--text-muted);margin-top:4px}.form-control,.form-select{border-radius:8px;padding:12px;border:1px solid #dee2e6;transition:.3s}.form-control:focus,.form-select:focus{box-shadow:0 0 0 3px rgba(52,152,219,.2);border-color:var(--accent-color)}.btn-primary{width:100%;background-color:var(--primary);color:#fff;padding:14px;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .3s,transform .1s;margin-top:10px}.btn-primary:active{transform:scale(.99)}.btn-primary:hover{background-color:#024;transform:translateY(-1px)}.option-btn{width:100%;text-align:left;padding:15px 20px;margin-bottom:10px;border-radius:10px;border:2px solid #e9ecef;background:#fff;transition:.2s}.option-btn:hover{border-color:var(--accent-color);background-color:#ebf5fb;color:var(--accent-color)}.row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
</style>
</head>

<body>

<div class="container">

<!-- FORM -->
<div class="quiz-container" id="formSection">
<header>
    <h2>InfoSec Proficiency Assessment:</h2>
    <p class="subtitle">"Your awareness is our strongest firewall; stay sharp, stay secure."</p>
  </header>

<div class="row">

<select class="form-select mb-2" id="region">
<option value="">--Select Region--</option>
<option value="EAST">EAST</option>
<option value="NORTH">NORTH</option>
<option value="SOUTH">SOUTH</option>
<option value="WEST">WEST</option>
</select>



<input class="form-control mb-2" id="location" placeholder="Location">
<input class="form-control mb-2" id="empCode" placeholder="Employee Code">
<input class="form-control mb-2" id="name" placeholder="Name">

<select class="form-select mb-2" id="functionSelect">
<option value="">---Select Department---</option>
<option value="OPS">Operations</option>
<option value="SAL">Sales</option>
<option value="CS">Customer Service</option>
<option value="IT">Information Technology</option>
<option value="SEC">Security</option>
</select>

<select class="form-select mb-2" id="subDept">
<option value="">-- Choose Assessment Type --</option>
</select>
</div>

<button type="button" class="btn btn-primary w-100" id="startBtn">Start Quiz</button>
</div>

<!-- QUIZ -->
<div class="quiz-container d-none" id="quizSection">
<h5 id="question"></h5>
<div id="answers" class="d-flex flex-wrap gap-2 mt-3"></div>
</div>

<!-- RESULT -->
<div class="quiz-container d-none" id="resultSection">
<h3>Result</h3>
<p id="userDetails"></p>
<h4 id="scoreText"></h4>
<p id="insertStatus"></p>
</div>


</div>
