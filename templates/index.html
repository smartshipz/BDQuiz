<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quiz App</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
   :root {
        --primary-color: #2c3e50;
        --secondary-color: #34495e;
        --accent-color: #3498db;
        --bg-light: #f8f9fa;
    }

    body { 
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        min-height: 100vh;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .quiz-container {
        max-width: 700px;
        margin: 50px auto;
        background: rgba(255, 255, 255, 0.95);
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        border: 1px solid rgba(255,255,255,0.3);
    }

    h3 { 
        color: var(--primary-color);
        font-weight: 700;
        letter-spacing: -0.5px;
    }

    .form-control, .form-select {
        border-radius: 8px;
        padding: 12px;
        border: 1px solid #dee2e6;
        transition: all 0.3s ease;
    }

    .form-control:focus, .form-select:focus {
        box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.2);
        border-color: var(--accent-color);
    }

    .btn-primary {
        background-color: var(--accent-color);
        border: none;
        padding: 12px;
        font-weight: 600;
        border-radius: 8px;
        transition: transform 0.2s;
    }

    .btn-primary:hover {
        background-color: #2980b9;
        transform: translateY(-1px);
    }

    .option-btn {
        width: 100%;
        text-align: left;
        padding: 15px 20px;
        margin-bottom: 10px;
        border-radius: 10px;
        border: 2px solid #e9ecef;
        background: white;
        transition: all 0.2s ease;
    }

    .option-btn:hover {
        border-color: var(--accent-color);
        background-color: #ebf5fb;
        color: var(--accent-color);
    }

</style>
</head>

<body>

<div class="container">

<!-- FORM -->
<div class="quiz-container" id="formSection">
<h3 class="text-center mb-3">Employee Quiz</h3>

<div class="row">

<select class="form-select mb-2" id="region">
<option value="">-- Select Region --</option>
<option value="EAST">EAST</option>
<option value="NORTH">NORTH</option>
<option value="SOUTH">SOUTH</option>
<option value="WEST">WEST</option>
</select>



<input class="form-control mb-2" id="location" placeholder="Location">
<input class="form-control mb-2" id="empCode" placeholder="Employee Code">
<input class="form-control mb-2" id="name" placeholder="Name">
</div>

<select class="form-select mb-2" id="functionSelect">
<option value="">-- Select Department --</option>
<option value="OPS">Operations</option>
<option value="CS">Customer Services</option>
<option value="SAL">Sales</option>
<option value="IT">Information Technology</option>
<option value="SEC">Security</option>
</select>

<select class="form-select mb-2" id="subDept">
<option value="">-- Select Assessment Type --</option>
</select>

<button type="button" class="btn btn-primary w-100" id="startBtn">Start Quiz</button>
</div>

<!-- QUIZ -->
<div class="quiz-container d-none" id="quizSection">
<h5 id="question"></h5>
<div id="answers" class="d-flex flex-wrap gap-2 mt-3"></div>
</div>

<!-- RESULT -->
<div class="quiz-container d-none" id="resultSection">
<h3>Result</h3>
<p id="userDetails"></p>
<h4 id="scoreText"></h4>
<p id="insertStatus"></p>
</div>

</div>

<script>

// GLOBAL
let questions = [];
let currentQ = 0;
let score = 0;
let userData = {};
const today = new Date().toISOString().split('T')[0];

// READY
document.addEventListener("DOMContentLoaded", function(){

    document.getElementById("startBtn").addEventListener("click", startQuiz);

    document.getElementById("functionSelect").addEventListener("change", function(){
        const sub = document.getElementById("subDept");
        sub.innerHTML = "<option value=''>-- Select Assessment Type --</option>";

        if(["OPS","CS","SEC","SAL"].includes(this.value)){
            sub.innerHTML += "<option value='OPSTEST'>Operations Assessment</option>";
        }
        else if(this.value==="IT"){
            sub.innerHTML += "<option value='ITTEST'>IT Assessment</option>";
        }
    });

});

// START
function startQuiz(){

    currentQ = 0;
    score = 0;

    userData = {
        region: document.getElementById("region").value,
        location: document.getElementById("location").value,
        empCode: document.getElementById("empCode").value,
        name: document.getElementById("name").value,
        function: document.getElementById("functionSelect").value,
        subDepartment: document.getElementById("subDept").value,
        date: today
    };

    if(!userData.name || !userData.empCode || !userData.region || !userData.function || !userData.subDepartment){
        alert("Fill all required fields");
        return;
    }

    // QUESTIONS LOGIC
    if(userData.subDepartment === "OPSTEST"){
        questions = [
    {"q": "Customer cannot Track awb status in website without login", "options": ["True", "False"], "answer": 1},
    {"q": "Field in-scan of shipments can be done from office", "options": ["True", "False"], "answer": 1},
    {"q": "Rejected AWB while In-scan can be returned back to:", "options": ["To Shipper", "Cs In-Charge", "Info IT In-Charge and get data for further process"], "answer": 2},
    {"q": "Delivery of OTP enabled shipments needs to be delivered only with OTP", "options": ["True", "False"], "answer": 0},
    {"q": "Delivery Status of the shipment via OTM to be updated", "options": ["From Field", "From Office", "From Home"], "answer": 0},
    {"q": "For Booking International shipments, Consignee address book needs to be updated (Mandatory)", "options": ["True", "False"], "answer": 0},
    {"q": "Digital payments while delivery is prohibited", "options": ["True", "False"], "answer": 1},
    {"q": "Shipping data of Customer is available for last 90 days only", "options": ["True", "False"], "answer": 0},
    {"q": "I can save critical data in the local hard disk of the pc", "options": ["True", "False"], "answer": 1},
    {"q": "Bulk status update in OTM devices, sync not happening, how to prevent this?", "options": ["Keep Restarting the Device", "Call IT Person", "Do Manual sync at Regular Intervals"], "answer": 2},
    {"q": "Delivered Shipments Status not Syncing with C2NG, what to do?", "options": ["Do manual status update", "Share backup file to IT person", "Redo the process"], "answer": 1},
    {"q": "EMAIL received from suspicious ID asking to click URL & forward same", "options": ["Do as said in Mail", "Immediately delete mail & report to IT", "Take no action"], "answer": 1},
    {"q": "In BlueDart, Teams Chat History remains for how many days?", "options": ["30 Days", "180 Days", "90 Days", "None of the above"], "answer": 1},
    {"q": "Which of the following is NOT allowed as per IT policy?", "options": ["Using Guest Wi-Fi for external laptops", "Saving critical data on local hard disk", "Accessing C2NG portal with 2FA", "Using Microsoft Edge for enterprise portal"], "answer": 1},
    {"q": "What is the correct way to handle OTP-enabled deliveries?", "options": ["Deliver without OTP if customer requests", "Deliver only after OTP verification", "Call IT for OTP bypass", "Use any random OTP"], "answer": 1},
    {"q": "What should you do if BYOD device fails to send OTP to customer?", "options": ["Change mobile immediately", "Check network of delivery staff & customer", "Ignore and deliver without OTP", "Reset the app without informing IT"], "answer": 1},
    {"q": "If you receive an email asking for your login credentials, what is the correct action?", "options": ["Reply with your credentials", "Report the email to IT immediately", "Forward the email to colleagues", "Click the link to verify"], "answer": 1},
    {"q": "Sharing your password with your boss or colleagues is:", "options": ["Allowed in emergencies", "Strictly prohibited", "Allowed if approved by IT", "Allowed for faster work"], "answer": 1}
];
    } else {
        questions = [
    {"q": "What is ISAT", "options": ["Information System Awareness Training", "Information Security Awareness Training", "Information Security Awareness Technology"], "answer": 1},
    {"q": "Password Management", "options": ["Do Not Record password on Paper", "Never Share your password", "At least 15 characters long", "All The Above"], "answer": 3},
    {"q": "Allowing unauthorized personnel to access the system", "options": ["Yes, it’s a Business Need", "No, don’t Allow unauthorised personnel"], "answer": 1},
    {"q": "Email Attachments – Best Practices", "options": ["Avoid unknown senders", "Do not respond to unauthorized info requests", "Delete junk/phishing and inform IT", "All the Above"], "answer": 3},
    {"q": "We can connect pen drive / Mobile in office pc", "options": ["Yes", "No. don't connect such devices"], "answer": 1},
    {"q": "What is BCP", "options": ["Business Continuity Plan", "Business Computer policy", "Business compliance policy"], "answer": 0},
    {"q": "Customer Data Handling", "options": ["Store for 1 month", "Keep in Onedrive", "Store in mail folder", "Delete immediately after processing"], "answer": 3},
    {"q": "What is DPP", "options": ["Data Privacy Policy", "Data Private Policy", "Data Protection Policy"], "answer": 2},
    {"q": "Who must adhere to Data Privacy Policy?", "options": ["All employees, vendors, partners", "Only BD Employee", "Applicable only for IT Employee"], "answer": 0},
    {"q": "Personal data should only be collected for", "options": ["Business Purpose", "Personal use"], "answer": 0},
    {"q": "Policy regarding external laptops?", "options": ["Connect after approval", "Strictly prohibited; Guest network only", "Connect if antivirus installed", "No restriction"], "answer": 1},
    {"q": "Requirements for C2NG / Enterprise Portal via internet?", "options": ["No authentication", "MFA, Win 10+, Edge/Chrome", "Internal network only", "VPN only"], "answer": 1},
    {"q": "Mailbox size for O365 license types?", "options": ["E3 – 99 GB; F3R+ – 2 GB", "E3 – 50 GB; F3R+ – 10 GB", "Both 99 GB", "E3 – Unlimited; F3R+ – 2 GB"], "answer": 0},
    {"q": "Who cascades approved scope to RSA and RITH?", "options": ["CISSO", "Head-IT", "AISA", "RSA"], "answer": 2},
    {"q": "Who recommends RSA appointment to AISA?", "options": ["CISSO", "RITH", "Head-IT", "SA"], "answer": 1},
    {"q": "Who decides the audit team to visit locations?", "options": ["AISA only", "RSA/RITH", "CISSO", "SA"], "answer": 1},
    {"q": "Location with >3 severe non-compliances audited by:", "options": ["SA only", "CISSO and Head-IT", "RSA/RITH", "AISA only"], "answer": 3},
    {"q": "Key independence requirement for Security Auditors?", "options": ["Same department", "Nominated by users", "No responsibility for audited area", "Report to Head-IT"], "answer": 2},
    {"q": "Who forwards audit schedule to SAs?", "options": ["AISA", "RSA", "RITH", "CISSO"], "answer": 1},
    {"q": "Approval workflow for Security Auditors?", "options": ["AISA selects directly", "RSA recommends; RITH/AISA approve", "CISSO appoints", "SA appoints themselves"], "answer": 1},
    {"q": "Role of AISA in audit process?", "options": ["Field audits", "Approves scope and appointments", "Manages ESP module", "Reports non-compliance"], "answer": 1},
    {"q": "Tool referenced for audit scheduling?", "options": ["Online Tracker", "ESP Audit module", "Risk Register", "GRC Dashboard"], "answer": 1},
    {"q": "Primary purpose of APIGEE?", "options": ["Invoices", "Secure API integration", "Physical shipments", "Customer IDs"], "answer": 1},
    {"q": "Blue Dart APIs use REST and HTTPS?", "options": ["TRUE", "FALSE"], "answer": 0},
    {"q": "Role of SaaS providers in logistics?", "options": ["Hardware", "Plug-ins and pre-integrated APIs", "Replace tracking", "Manual entry"], "answer": 1},
    {"q": "NOT an e-store platform mentioned?", "options": ["Shopify", "Magento", "WooCommerce", "Oracle ERP"], "answer": 3},
    {"q": "Protects data from unauthorized access?", "options": ["Formatting", "Encryption", "Copy-paste", "Zoom"], "answer": 1},
    {"q": "Use of cloud storage?", "options": ["Offline programs", "Physical drives only", "Access over internet", "Printing"], "answer": 2},
    {"q": "What does API stand for?", "options": ["Application Programming Interface", "Advanced Programming Interface", "Application Programming Integration", "Automated Program Interface"], "answer": 0},
    {"q": "What does REST stand for?", "options": ["Remote Execution", "Representational State Transfer", "Reliable State Transfer", "Resource Technology"], "answer": 1},
    {"q": "Data format most used in APIs?", "options": ["XML", "CSV", "JSON", "HTML"], "answer": 2},
    {"q": "What is an API endpoint?", "options": ["Server", "User interface", "Specific URL for requests", "Language"], "answer": 2},
    {"q": "Common API authentication method?", "options": ["CAPTCHA", "API Key", "HTML Form", "CSS Token"], "answer": 1},
    {"q": "Status code for 'Unauthorized'?", "options": ["200", "400", "401", "403"], "answer": 2},
    {"q": "What does HTTPS provide in APIs?", "options": ["Speed", "Encryption and security", "Payload", "UI support"], "answer": 1},
    {"q": "What is API documentation used for?", "options": ["Auto-code", "Explaining how to use API", "Hosting", "Performance"], "answer": 1},
    {"q": "Upload soft data to portal AND share as mail attachment?", "options": ["TRUE", "FALSE"], "answer": 1}
];
    }

    document.getElementById("formSection").classList.add("d-none");
    document.getElementById("quizSection").classList.remove("d-none");

    loadQuestion();
}

// LOAD
function loadQuestion(){
    const q = questions[currentQ];

    document.getElementById("question").innerText = `Q${currentQ+1}. ${q.q}`;

    const ansDiv = document.getElementById("answers");
    ansDiv.innerHTML = "";

    q.options.forEach((opt,i)=>{
        const btn = document.createElement("button");
        btn.innerText = opt;
        btn.className = "btn btn-outline-primary option-btn";
        btn.onclick = ()=>checkAnswer(i);
        ansDiv.appendChild(btn);
    });
}

// CHECK
function checkAnswer(selected){

    const btns = document.querySelectorAll(".option-btn");

    btns.forEach((b,i)=>{
        if(i===questions[currentQ].answer) b.classList.add("btn-success");
        else if(i===selected) b.classList.add("btn-danger");
        b.disabled=true;
    });

    if(selected===questions[currentQ].answer) score++;

    currentQ++;

    setTimeout(()=>{
        if(currentQ < questions.length) loadQuestion();
        else showResult();
    },10);
}

// RESULT
function showResult(){

    document.getElementById("quizSection").classList.add("d-none");
    document.getElementById("resultSection").classList.remove("d-none");

    document.getElementById("userDetails").innerText =
        `Name: ${userData.name} | Emp: ${userData.empCode} | Dept: ${userData.function} | Sub: ${userData.subDepartment}`;

    document.getElementById("scoreText").innerText =
        `Score: ${score} / ${questions.length}`;

    fetch('/insert',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({...userData, score, total:questions.length})
    })
    .then(res=>res.json())
    .then(d=>{
        document.getElementById("insertStatus").innerText = "DB: " + d.message;
    })
    .catch(()=>{
        document.getElementById("insertStatus").innerText = "DB Error";
    });
}

</script>

</body>
</html>
